<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 740" role="img"
     font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
  <title>RegRadar agent-to-table ownership map</title>
  <desc>Three agents — Policy Crawler, Monitoring Agent, Impact Analysis Agent — and which tables each reads from or writes to.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .legend-text { fill: #C2C0B6; font-size: 12px; }
      .table-name  { font-size: 14px; font-weight: 500; }
      .table-sub   { font-size: 12px; }
      .agent-name  { font-size: 14px; font-weight: 500; }
      .agent-sub   { font-size: 12px; }
    </style>
  </defs>

  <!-- ── Legend ── -->
  <rect x="40"  y="16" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="56"  y="25" class="legend-text">READ</text>
  <rect x="100" y="16" width="10" height="10" rx="2" fill="#D85A30"/>
  <text x="116" y="25" class="legend-text">WRITE</text>
  <rect x="160" y="16" width="10" height="10" rx="2" fill="#378ADD"/>
  <text x="176" y="25" class="legend-text">READ + WRITE</text>

  <!-- ═══════════════════════════════════════
       LEFT COLUMN — shared data tables
       ═══════════════════════════════════════ -->

  <!-- regulations -->
  <g>
    <rect x="40" y="50" width="160" height="46" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="120" y="68" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" class="table-name">regulations</text>
    <text x="120" y="84" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" class="table-sub">7 TILA / FCRA controls</text>
  </g>

  <!-- policy_changes -->
  <g>
    <rect x="40" y="118" width="160" height="46" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="120" y="136" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" class="table-name">policy_changes</text>
    <text x="120" y="152" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" class="table-sub">Crawler-detected diffs</text>
  </g>

  <!-- schema_events -->
  <g>
    <rect x="40" y="186" width="160" height="46" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="120" y="204" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" class="table-name">schema_events</text>
    <text x="120" y="220" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" class="table-sub">Field enrichment log</text>
  </g>

  <!-- data_assets -->
  <g>
    <rect x="40" y="254" width="160" height="46" rx="8" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="120" y="272" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" class="table-name">data_assets</text>
    <text x="120" y="288" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9" class="table-sub">Portfolio tables</text>
  </g>

  <!-- critical_data_elements -->
  <g>
    <rect x="40" y="322" width="160" height="46" rx="8" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="120" y="340" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" class="table-name">critical_data_elements</text>
    <text x="120" y="356" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9" class="table-sub">Field-level CDE registry</text>
  </g>

  <!-- asset_regulation_map -->
  <g>
    <rect x="40" y="390" width="160" height="46" rx="8" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="120" y="408" text-anchor="middle" dominant-baseline="central" fill="#D3D1C7" class="table-name">asset_regulation_map</text>
    <text x="120" y="424" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9" class="table-sub">Asset ↔ reg linkage</text>
  </g>

  <!-- compliance_violations -->
  <g>
    <rect x="40" y="458" width="160" height="46" rx="8" fill="#791F1F" stroke="#F09595" stroke-width="0.5"/>
    <text x="120" y="476" text-anchor="middle" dominant-baseline="central" fill="#F7C1C1" class="table-name">compliance_violations</text>
    <text x="120" y="492" text-anchor="middle" dominant-baseline="central" fill="#F09595" class="table-sub">Detected breaches</text>
  </g>

  <!-- compliance_scans -->
  <g>
    <rect x="40" y="526" width="160" height="46" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="120" y="544" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" class="table-name">compliance_scans</text>
    <text x="120" y="560" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" class="table-sub">Daily scan time-series</text>
  </g>

  <!-- remediation_steps -->
  <g>
    <rect x="40" y="594" width="160" height="46" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
    <text x="120" y="612" text-anchor="middle" dominant-baseline="central" fill="#FAC775" class="table-name">remediation_steps</text>
    <text x="120" y="628" text-anchor="middle" dominant-baseline="central" fill="#EF9F27" class="table-sub">Approved fix playbooks</text>
  </g>

  <!-- ═══════════════════════════════════════
       RIGHT COLUMN — agents
       ═══════════════════════════════════════ -->

  <!-- Policy Crawler -->
  <g>
    <rect x="440" y="86" width="200" height="66" rx="10" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="540" y="109" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" class="agent-name">Policy Crawler</text>
    <text x="540" y="127" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" class="agent-sub">Hourly • 1 LLM call / reg change</text>
    <text x="540" y="143" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" class="agent-sub">Nimble + DeepMind embed</text>
  </g>

  <!-- Monitoring Agent -->
  <g>
    <rect x="440" y="304" width="200" height="66" rx="10" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
    <text x="540" y="327" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4" class="agent-name">Monitoring Agent</text>
    <text x="540" y="345" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" class="agent-sub">Daily • zero LLM calls</text>
    <text x="540" y="361" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" class="agent-sub">Pure deterministic SQL</text>
  </g>

  <!-- Impact Analysis Agent -->
  <g>
    <rect x="440" y="522" width="200" height="66" rx="10" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
    <text x="540" y="540" text-anchor="middle" dominant-baseline="central" fill="#F5C4B3" class="agent-name">Impact Analysis Agent</text>
    <text x="540" y="558" text-anchor="middle" dominant-baseline="central" fill="#F0997B" class="agent-sub">Event-driven • 1 LLM call</text>
    <text x="540" y="574" text-anchor="middle" dominant-baseline="central" fill="#F0997B" class="agent-sub">Policy / schema / behavior</text>
  </g>

  <!-- ═══════════════════════════════════════
       CONNECTORS
       teal #1D9E75 = READ   coral #D85A30 = WRITE
       ═══════════════════════════════════════ -->

  <!-- ── POLICY CRAWLER ── -->
  <!-- READS regulations -->
  <path d="M200 73 L360 73 L360 100 L440 100" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- WRITES policy_changes -->
  <path d="M440 119 L360 119 L360 141 L200 141" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- WRITES regulations (version update) -->
  <path d="M440 130 L400 130 L400 83 L200 83" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ── MONITORING AGENT ── -->
  <!-- READS data_assets -->
  <path d="M200 277 L320 277 L320 318 L440 318" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- READS asset_regulation_map -->
  <path d="M200 413 L320 413 L320 345 L440 345" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- READS regulations -->
  <path d="M200 63 L300 63 L300 330 L440 330" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- WRITES compliance_scans -->
  <path d="M440 356 L320 356 L320 549 L200 549" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- WRITES compliance_violations -->
  <path d="M440 366 L330 366 L330 481 L200 481" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── IMPACT ANALYSIS AGENT ── -->
  <!-- READS policy_changes -->
  <path d="M200 153 L280 153 L280 528 L440 528" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- READS schema_events -->
  <path d="M200 209 L270 209 L270 540 L440 540" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- READS data_assets -->
  <path d="M200 285 L260 285 L260 552 L440 552" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- WRITES compliance_violations -->
  <path d="M440 565 L350 565 L350 471 L200 471" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- WRITES remediation_steps -->
  <path d="M440 575 L360 575 L360 617 L200 617" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- READS regulations (context lookup) -->
  <path d="M200 73 L250 73 L250 564 L440 564" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
